<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fafafa">
  <title>Home Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="dashboard">
    <section class="left-panel" aria-label="Time and weather">
      <div id="clock" aria-live="off"><span id="clock-main">--:--</span><span id="clock-seconds">--</span></div>
      <div id="date">Loading date…</div>

      <div id="weather" aria-live="polite">
        <div id="temperature-range">Loading weather…</div>
        <div id="weather-condition"></div>
      </div>
    </section>

    <section class="right-panel" aria-label="Upcoming calendar events">
      <div id="events">Loading calendar…</div>
    </section>

    <div id="status" aria-hidden="true"></div>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
